  free_response_channels: ''
  allowed_channels: ''
  auto_thread: true
  reactions: true
  channel_prompts: {}
whatsapp: {}
telegram:
  channel_prompts: {}
slack:
  channel_prompts: {}
mattermost:
  channel_prompts: {}
approvals:
  mode: smart
  timeout: 60
command_allowlist: []
quick_commands: {}
personalities: {}
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: false
  website_blocklist:
    enabled: false
    domains: []
    shared_files: []
cron:
  wrap_response: true
code_execution:
  mode: project
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
network:
  force_ipv4: false
_config_version: 19
command_blocklist:
- cat .*\.env
- printenv
- env$
- echo \$HOME
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
gateway:
  dm_policy: allowlist
  allowed_users:
  - 8088452103
  platforms: {}
platform_toolsets:
  cli:
  - clarify
  - cronjob
  - delegation
  - file
  - homeassistant
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - web
  telegram:
  - clarify
  - cronjob
  - file
  - memory
  - session_search
